<!doctype html>
<html lang="zh-tw">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>4x4 賓果篩選器</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
  <div id="app">
    <div class="container mt-5">
      <h1 class="text-center mb-4">4x4 賓果篩選器</h1>
      <div class="row">
        <div class="col-md-6">
          <h2 class="text-center">我的賓果 (點擊設定狀態)</h2>
          <div id="my-bingo-grid" class="bingo-grid">
            <div v-for="(row, rowIndex) in myBingoState" :key="rowIndex" class="bingo-row">
              <div v-for="(cellState, colIndex) in row" :key="colIndex"
                :class="['bingo-cell', {'matched': cellState === 1, 'unmatched': cellState === 2}]"
                @click="handleCellClick(rowIndex, colIndex)">
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <h2 class="text-center">符合結果的賓果</h2>
          <div id="result-bingo-grid" class="bingo-grid">
            <template v-if="resultBingo">
              <div v-for="(row, rowIndex) in resultBingo" :key="rowIndex" class="bingo-row">
                <div v-for="(cellValue, colIndex) in row" :key="colIndex"
                  :class="['bingo-cell', {'matched': cellValue === 1}]">
                </div>
              </div>
            </template>
            <p v-else class="text-center mt-3">沒有符合的賓果</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 5px;
      width: 300px;
      height: 300px;
      margin: 0 auto;
      border: 1px solid #ccc;
      padding: 5px;
    }

    .bingo-cell {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2em;
      font-weight: bold;
      border: 1px solid #eee;
      cursor: pointer;
      background-color: white; /* Default unknown */
    }

    .bingo-cell.matched {
      background-color: red;
    }

    .bingo-cell.unmatched {
      background-color: green;
    }
  </style>

  <!-- Bootstrap JS Bundle (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="Lottery.js"></script>
</body>

</html>
